name: automobile
description: A polished Flutter login screen with Google Sign-In.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  google_sign_in: ^6.2.1
  go_router: ^15.1.2
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.4.9
  fl_chart: ^0.66.0
  animate_do: ^3.1.2
  google_fonts: ^6.1.0
  intl: ^0.19.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
